services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: miniflow
      POSTGRES_PASSWORD: miniflow
      POSTGRES_DB: miniflow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U miniflow"]
      interval: 3s
      timeout: 3s
      retries: 10

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://miniflow:miniflow@db:5432/miniflow
      PORT: "8000"
    ports:
      - "8000:8000"

volumes:
  pgdata:
